name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
            stable_assets: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg=>Ketchup-macOS-Apple-Silicon.dmg
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
            stable_assets: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg=>Ketchup-macOS-Intel.dmg
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
            stable_assets: |
              src-tauri/target/release/bundle/appimage/*.AppImage=>Ketchup-Linux-x64.AppImage
              src-tauri/target/release/bundle/deb/*.deb=>Ketchup-Linux-x64.deb
              src-tauri/target/release/bundle/rpm/*.rpm=>Ketchup-Linux-x64.rpm
          - name: Windows x64
            platform: windows-latest
            args: ""
            stable_assets: |
              src-tauri/target/release/bundle/nsis/*.exe=>Ketchup-Windows-x64-setup.exe
              src-tauri/target/release/bundle/msi/*.msi=>Ketchup-Windows-x64.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Ketchup ${{ github.ref_name }}
          releaseBody: See the attached assets to download Ketchup for Windows, macOS, and Linux.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      - name: Upload stable download aliases
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STABLE_ASSETS: ${{ matrix.stable_assets }}
        run: |
          set -euo pipefail

          while IFS= read -r mapping; do
            if [ -z "$mapping" ]; then
              continue
            fi

            source_pattern="${mapping%%=>*}"
            stable_name="${mapping##*=>}"
            matches=( $source_pattern )

            if [ ! -e "${matches[0]}" ]; then
              echo "No bundle found for ${source_pattern}"
              continue
            fi

            cp "${matches[0]}" "${RUNNER_TEMP}/${stable_name}"
            gh release upload "${GITHUB_REF_NAME}" "${RUNNER_TEMP}/${stable_name}" --clobber
          done <<< "$STABLE_ASSETS"
