<svg xmlns="http://www.w3.org/2000/svg" viewBox="76 92 360 360" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for depth -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2D3344" />
      <stop offset="100%" stop-color="#1A1E29" />
    </radialGradient>
    
    <!-- Vivid Red/Pink Gradient for Work phase / Tomato -->
    <linearGradient id="workGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5A5A" />
      <stop offset="100%" stop-color="#E02424" />
    </linearGradient>

    <!-- Vibrant Green Gradient for Break phase / Leaf -->
    <linearGradient id="breakGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    
    <!-- Deep Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>



  <!-- Glowing Circular Timer Track Background -->
  <circle cx="256" cy="272" r="120" fill="none" stroke="#000000" stroke-opacity="0.3" stroke-width="24" />
  
  <!-- Timer Progress (Red - Work Phase) -->
  <circle cx="256" cy="272" r="120" fill="none" stroke="url(#workGrad)" stroke-width="24" stroke-linecap="round" stroke-dasharray="600 754" stroke-dashoffset="0" transform="rotate(-90 256 272)" filter="url(#glow)" />
  
  <!-- Break phase segment bridging the remaining gap -->
  <circle cx="256" cy="272" r="120" fill="none" stroke="url(#breakGrad)" stroke-width="24" stroke-linecap="round" stroke-dasharray="104 754" stroke-dashoffset="-625" transform="rotate(-90 256 272)" filter="url(#glow)" />

  <!-- Tomato Core within the circle -->
  <path d="M256 362C306 362 336 332 336 282C336 232 306 202 256 202C206 202 176 232 176 282C176 332 206 362 256 362Z" fill="url(#workGrad)" filter="url(#shadow)" />
  
  <!-- Tomato highlights -->
  <path d="M256 215C285 215 310 230 320 260" stroke="#ffffff" stroke-opacity="0.25" stroke-width="8" stroke-linecap="round" fill="none" />
  
  <!-- Leaf detail -->
  <path d="M256 202C236 172 206 162 206 162C206 162 226 192 256 202Z" fill="url(#breakGrad)" />
  <path d="M256 202C276 182 306 172 306 172C306 172 286 212 256 202Z" fill="#6EE7B7" />

  <!-- Inner Play / Pause or Time Dots inside Tomato -->
  <circle cx="256" cy="282" r="40" fill="#1A1E29" fill-opacity="0.5" />
  <g transform="translate(232, 258) scale(2)" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
    <path d="M3 3v5h5"/>
    <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
    <path d="M21 21v-5h-5"/>
  </g>
</svg>
